name: Build ALX-LA-2A VST3 (Windows)

on:
  push:
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git

      - name: Configure (CMake + MSVC)
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALX-LA-2A-Windows-VST3
          path: build/ALX_LA_2A_artefacts/Release/VST3/ALX-LA-2A.vst3
